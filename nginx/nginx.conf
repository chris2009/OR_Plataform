worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout 65;

    # Aumentar buffer para WebSocket frames (JPEG base64)
    proxy_buffers 16 64k;
    proxy_buffer_size 128k;

    upstream backend {
        server backend:8000;
    }

    upstream frontend {
        server frontend:80;
    }

    server {
        listen 80;
        server_name localhost;

        client_max_body_size 500M;

        # ── API REST ──────────────────────────────────────
        location /api/ {
            proxy_pass         http://backend/api/;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 300s;
        }

        # ── WebSockets ────────────────────────────────────
        location /ws/ {
            proxy_pass         http://backend/ws/;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host $host;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        # ── Snapshots (archivos estáticos del backend) ────
        location /snapshots/ {
            proxy_pass         http://backend/snapshots/;
            proxy_set_header   Host $host;
        }

        # ── Frontend SPA ──────────────────────────────────
        location / {
            proxy_pass         http://frontend/;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;

            # Soporte React Router: devolver index.html para rutas SPA
            proxy_intercept_errors on;
            error_page 404 = @frontend_fallback;
        }

        location @frontend_fallback {
            proxy_pass http://frontend/;
        }
    }
}
